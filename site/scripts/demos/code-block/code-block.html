<!doctype html>
<html>
  <body style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;">
    <div style="padding:32px;">
      <div style="max-width:640px;background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden;">

        <!-- window chrome -->
        <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid #30363d;">
          <span style="width:12px;height:12px;border-radius:50%;background:#ff5f56;"></span>
          <span style="width:12px;height:12px;border-radius:50%;background:#ffbd2e;"></span>
          <span style="width:12px;height:12px;border-radius:50%;background:#27c93f;"></span>
          <span style="margin-left:8px;font-family:'SF Mono',ui-monospace,monospace;font-size:12px;color:#8b949e;">capture.ts</span>
        </div>

        <!-- code -->
        <pre style="margin:0;padding:18px 20px;font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:13.5px;line-height:1.7;color:#e6edf3;"><code><span style="color:#ff7b72;">import</span> { <span style="color:#79c0ff;">captureElementTree</span>, <span style="color:#79c0ff;">elementTreeToSvg</span> } <span style="color:#ff7b72;">from</span> <span style="color:#a5d6ff;">"domotion-svg"</span>;

<span style="color:#8b949e;">// Walk the rendered DOM into a serializable tree…</span>
<span style="color:#ff7b72;">const</span> <span style="color:#79c0ff;">tree</span> = <span style="color:#ff7b72;">await</span> <span style="color:#d2a8ff;">captureElementTree</span>(<span style="color:#ffa657;">page</span>, <span style="color:#a5d6ff;">"body"</span>);

<span style="color:#8b949e;">// …then emit one self-contained, scalable SVG.</span>
<span style="color:#ff7b72;">const</span> <span style="color:#79c0ff;">svg</span> = <span style="color:#d2a8ff;">elementTreeToSvg</span>(<span style="color:#ffa657;">tree</span>, <span style="color:#79c0ff;">720</span>, <span style="color:#79c0ff;">280</span>);</code></pre>

      </div>
    </div>
  </body>
</html>
