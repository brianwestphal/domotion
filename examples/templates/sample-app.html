<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- width=device-width so the mobile (phone) capture lays out at the real
       viewport width instead of the 980px default. -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(120% 120% at 0% 0%, #1d2740 0%, #0b1020 60%);
      color: #e7ecf5; min-height: 100vh; padding: 28px;
      display: flex; flex-direction: column; gap: 20px;
    }
    .top { display: flex; align-items: center; justify-content: space-between; }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
    .dot { width: 18px; height: 18px; border-radius: 6px; background: linear-gradient(135deg, #6366f1, #22d3ee); }
    .avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #ec4899, #f59e0b); }
    h1 { font-size: 30px; letter-spacing: -0.02em; }
    .sub { color: #9aa7bd; font-size: 15px; margin-top: 4px; }
    .stats { display: flex; flex-wrap: wrap; gap: 14px; }
    .card {
      flex: 1 1 150px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px 18px;
    }
    .card .k { color: #9aa7bd; font-size: 13px; }
    .card .v { font-size: 26px; font-weight: 700; margin-top: 6px; }
    .card .up { color: #34d399; font-size: 13px; margin-top: 2px; }
    .cta {
      margin-top: 4px; align-self: flex-start; background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: 0; border-radius: 10px; padding: 12px 20px; font-size: 15px; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="top">
    <div class="brand"><span class="dot"></span> Acme</div>
    <div class="avatar"></div>
  </div>
  <div>
    <h1>Good morning, Ada</h1>
    <div class="sub">Here's how your projects are doing today.</div>
  </div>
  <div class="stats">
    <div class="card"><div class="k">Active users</div><div class="v">12,840</div><div class="up">▲ 8.2%</div></div>
    <div class="card"><div class="k">Revenue</div><div class="v">$48.2k</div><div class="up">▲ 3.1%</div></div>
    <div class="card"><div class="k">Conversion</div><div class="v">5.7%</div><div class="up">▲ 0.4%</div></div>
  </div>
  <button class="cta">View full report</button>
</body>
</html>
