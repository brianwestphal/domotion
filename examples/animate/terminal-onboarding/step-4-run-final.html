<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; }
  .bg { width: 100%; height: 100%; box-sizing: border-box; padding: 26px;
    background: #0d1117; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .term { width: 620px; background: #1e1e2e; border-radius: 12px; overflow: hidden;
    box-shadow: 0 16px 50px rgba(0,0,0,0.5); }
  .chrome { display: flex; align-items: center; gap: 8px; padding: 11px 14px; background: #181825; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .title { margin-left: 8px; font-size: 12px; color: #9399b2; font-family: 'SF Mono', ui-monospace, monospace; }
  .body { padding: 18px 20px; font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 13.5px; line-height: 1.7; color: #cdd6f4; min-height: 168px; }
  .step { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #89b4fa; margin-bottom: 10px; }
  .prompt { white-space: pre; }
  .g { color: #a6e3a1; } .b { color: #89b4fa; } .d { color: #6c7086; } .y { color: #f9e2af; }
  .cmdslot { display: inline-block; min-width: 1px; }
</style>
</head>
<body>
  <div class="bg">
    <div class="term">
      <div class="chrome">
        <span class="dot" style="background:#f38ba8;"></span>
        <span class="dot" style="background:#f9e2af;"></span>
        <span class="dot" style="background:#a6e3a1;"></span>
        <span class="title">zsh — onboarding (4 / 4)</span>
      </div>
      <div class="body">
        <div class="step">Step 4 · Run</div>
        <div class="prompt"><span class="g">➜</span> <span class="b">web</span> npm run dev</div>
        <div class="y">▲ dev server ready in 380ms</div>
        <div class="d">  ➜ Local:   http://localhost:3000</div>
        <div class="d">  ➜ Network: http://192.168.1.24:3000</div>
        <div><span class="g">✓</span> You're up and running 🎉</div>
      </div>
    </div>
  </div>
</body>
</html>
