<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; }
  /* Gradient lives on a full-size wrapper, not <body>: capturing a gradient
     applied directly to the root element is not yet supported. */
  .bg {
    width: 100%; height: 100%; box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 30%, #1f2937, #0b1120);
    font-family: Helvetica, Arial, sans-serif; color: #e5e7eb;
  }
  .title { font-size: 34px; font-weight: 700; }
  .sub { font-size: 16px; opacity: 0.7; margin-top: 8px; }
</style>
</head>
<body>
  <div class="bg">
    <div class="title">Deploying your site</div>
    <div class="sub">Hang tight — this only takes a moment</div>
  </div>
</body>
</html>
