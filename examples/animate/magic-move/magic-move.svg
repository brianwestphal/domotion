  </defs>
  <style>
@font-face { font-family: "dmf0"; font-style: normal; font-weight: 400; src: url("data:font/ttf;base64,"); }
@font-face { font-family: "dmf1"; font-style: normal; font-weight: 400; src: url("data:font/ttf;base64,"); }
    :root { --scene-dur: 3.80s; }
    .f { opacity: 0; visibility: hidden; }
    
    @keyframes fv-0 {
      0% { opacity: 0; }
      0.000% { opacity: 0; }
      0.000% { opacity: 1; }
      31.580% { opacity: 1; }
      31.581% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes fd-0 {
      0% { visibility: hidden; }
      0.000% { visibility: hidden; }
      0.000% { visibility: visible; }
      35.527% { visibility: visible; }
      35.528% { visibility: hidden; }
      100% { visibility: hidden; }
    }
    .f-0 { animation: fv-0 3.80s step-end infinite, fd-0 3.80s step-end infinite; }

    @keyframes mmv-0 {
      0% { opacity: 0; }
      31.579% { opacity: 0; }
      31.580% { opacity: 1; }
      50.000% { opacity: 1; }
      50.001% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes mmd-0 {
      0% { visibility: hidden; }
      27.632% { visibility: hidden; }
      27.633% { visibility: visible; }
      53.947% { visibility: visible; }
      53.948% { visibility: hidden; }
      100% { visibility: hidden; }
    }
    .mm-0 { animation: mmv-0 3.80s step-end infinite, mmd-0 3.80s step-end infinite; }

    @keyframes mms-anim-mm0-mv0 {
      0%, 31.580% { transform: translate(40px, 40px) scale(0.75, 0.69231) translate(-320px, -190px); }
      50.000%, 100% { transform: none; }
    }

    @keyframes mmf-anim-mm0-in0 {
      0%, 31.580% { opacity: 0; }
      50.000%, 100% { opacity: 1; }
    }

    @keyframes mmf-anim-mm0-out0 {
      0%, 31.580% { opacity: 1; }
      50.000%, 100% { opacity: 0; }
    }
    .anim-mm0-mv0 { animation: mms-anim-mm0-mv0 3.80s infinite; }
    .anim-mm0-in0 { animation: mmf-anim-mm0-in0 3.80s infinite; }
    .anim-mm0-out0 { animation: mmf-anim-mm0-out0 3.80s infinite; }

    @media (prefers-reduced-motion: reduce) {
      .anim-mm0-mv0 { animation: none; transform: none; }
      .anim-mm0-in0 { animation: none; opacity: 1; }
      .anim-mm0-out0 { animation: none; opacity: 0; }
    }

    @keyframes fv-1 {
      0%, 49.99% { opacity: 0; }
      50.00%, 100% { opacity: 1; }
    }
    @keyframes fd-1 {
      0% { visibility: hidden; }
      46.052% { visibility: hidden; }
      46.053% { visibility: visible; }
      100.000% { visibility: visible; }
      100.000% { visibility: hidden; }
      100% { visibility: hidden; }
    }
    .f-1 { animation: fv-1 3.80s infinite, fd-1 3.80s infinite step-end; }
  </style>
