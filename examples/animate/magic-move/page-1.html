<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; background: #f8fafc; font-family: system-ui, sans-serif; }
  .card { position: absolute; left: 40px; top: 40px; width: 180px; height: 90px;
    background: #4f46e5; color: #fff; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .chip { position: absolute; left: 40px; top: 300px; width: 120px; height: 34px;
    background: #ef4444; color: #fff; border-radius: 17px;
    display: flex; align-items: center; justify-content: center; font-size: 14px; }
</style>
</head>
<body>
  <div class="card" data-magic-key="hero">Overview</div>
  <div class="chip">Draft</div>
</body>
</html>
