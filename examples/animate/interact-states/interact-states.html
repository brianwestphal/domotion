<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 640px; height: 220px; }
  body { background: #0d1117; font-family: -apple-system, system-ui, sans-serif; color: #c9d1d9;
         display: flex; align-items: center; justify-content: center; gap: 26px; }
  .btn { width: 150px; height: 52px; border-radius: 10px; display: flex; align-items: center;
         justify-content: center; font-size: 16px; font-weight: 600; }
  .hover { background: #21262d; }
  .focus { background: #161b22; border: 1px solid #30363d; }
  .press { background: #238636; color: #fff; }
  .cap { position: absolute; top: 26px; font-size: 13px; color: #8b949e; letter-spacing: .04em; }
</style></head>
<body>
  <div class="btn hover">Hover</div>
  <div class="btn focus">Focus</div>
  <div class="btn press">Press</div>
</body></html>
