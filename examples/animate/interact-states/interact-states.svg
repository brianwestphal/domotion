<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" width="640" height="220">
  <defs>
    <clipPath id="viewport-clip"><rect width="640" height="220" /></clipPath>
  </defs>
  <style>
@font-face { font-family: "dmf0"; font-style: normal; font-weight: 600; src: url("data:font/ttf;base64,"); }
    :root { --scene-dur: 3.60s; }
    .f { opacity: 0; visibility: hidden; }
    
    @keyframes fv-0 {
      0% { opacity: 0; }
      0.000% { opacity: 0; }
      0.000% { opacity: 1; }
      100.000% { opacity: 1; }
      100.000% { opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes fd-0 {
      0% { visibility: hidden; }
      0.000% { visibility: hidden; }
      0.000% { visibility: visible; }
      100.000% { visibility: visible; }
      100.000% { visibility: hidden; }
      100% { visibility: hidden; }
    }
    .f-0 { animation: fv-0 3.60s step-end infinite, fd-0 3.60s step-end infinite; }

    @keyframes ix0 {
      0% { opacity: 0; transform: scale(1); animation-timing-function: ease-out; }
      13.33% { opacity: 1; transform: scale(1.03); }
      21.11% { opacity: 1; transform: scale(1.03); animation-timing-function: ease-in; }
      31.11% { opacity: 0; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }
    .ix0 { animation: ix0 1800ms linear 200ms infinite both; transform-origin: 144px 110px; }

    @keyframes ix0_1 {
      0% { opacity: 0; transform: scale(1); animation-timing-function: ease-out; }
      13.33% { opacity: 1; transform: scale(1); }
      21.11% { opacity: 1; transform: scale(1); animation-timing-function: ease-in; }
      31.11% { opacity: 0; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }
    .ix0_1 { animation: ix0_1 1800ms linear 200ms infinite both; transform-origin: 320px 110px; }

    @keyframes ix0_2 {
      0% { opacity: 0; transform: scale(1); animation-timing-function: ease-out; }
      13.33% { opacity: 1; transform: scale(0.96); }
      21.11% { opacity: 1; transform: scale(0.96); animation-timing-function: ease-in; }
      31.11% { opacity: 0; transform: scale(1); }
      100% { opacity: 0; transform: scale(1); }
    }
    .ix0_2 { animation: ix0_2 1800ms linear 200ms infinite both; transform-origin: 496px 110px; }
  </style>
  <g clip-path="url(#viewport-clip)">
