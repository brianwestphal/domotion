<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; }
  .bg {
    width: 100%; height: 100%; box-sizing: border-box; padding: 40px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
    background: #0d1117; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  h1 { margin: 0; font-size: 26px; font-weight: 700; }
  p { margin: 0; font-size: 15px; color: #8b949e; }
  .cta {
    margin-top: 6px; padding: 13px 26px; border: 0; border-radius: 10px;
    background: #1f6feb; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .cta.done { background: #238636; }
</style>
</head>
<body>
  <div class="bg">
    <h1>Deploy your site</h1>
    <p>One click ships the latest build to production.</p>
    <button class="cta" onclick="this.classList.add('done'); this.textContent='Deployed ✓';">Deploy now</button>
  </div>
</body>
</html>
