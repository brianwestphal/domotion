<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; box-sizing: border-box; }
  body { width: 420px; height: 280px; background: #0d1117; display: flex; align-items: center; justify-content: center;
         font-family: -apple-system, system-ui, sans-serif; }
  #card { width: 240px; height: 130px; background: linear-gradient(135deg,#238636,#2ea043); border-radius: 14px;
          display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: 600;
          box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  /* The JS handler flips this class — a MOTION-only change (transform), no added/removed nodes. */
  #card.lifted { transform: scale(1.1) translateY(-10px); }
</style></head>
<body>
  <div id="card">Hover me</div>
  <script>
    document.getElementById('card').addEventListener('mouseover', function () { this.classList.add('lifted'); });
  </script>
</body></html>
