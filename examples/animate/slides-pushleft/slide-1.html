<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; }
  /* Gradient lives on a full-size wrapper, not <body>: capturing a gradient
     applied directly to the root element is not yet supported. */
  .bg {
    width: 100%; height: 100%; box-sizing: border-box;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    font-family: Helvetica, Arial, sans-serif; color: #ffffff;
  }
  .num { font-size: 96px; font-weight: 800; line-height: 1; opacity: 0.35; }
  .label { font-size: 30px; font-weight: 600; margin-top: 6px; }
  .sub { font-size: 16px; opacity: 0.8; margin-top: 4px; }
</style>
</head>
<body>
  <div class="bg">
    <div class="num">01</div>
    <div class="label">Render the DOM</div>
    <div class="sub">Chromium paints the page exactly once</div>
  </div>
</body>
</html>
