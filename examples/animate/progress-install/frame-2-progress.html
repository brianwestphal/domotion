<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; }
  body { background: #0d1117; font-family: "SF Mono", Menlo, Monaco, monospace; }
  .bar { height: 36px; background: #161b22; display: flex; align-items: center; gap: 8px; padding: 0 14px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }
  .body { padding: 16px; font-size: 14px; line-height: 22px; color: #c9d1d9; white-space: pre; }
  .prompt { color: #3fb950; }
  .dim { color: #8b949e; }
  .track { margin-top: 14px; width: 420px; height: 10px; background: #21262d; border-radius: 5px; overflow: hidden; }
  .bar-fill { width: 0%; height: 100%; background: #58a6ff; border-radius: 5px; }
</style>
</head>
<body>
  <div class="bar"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
  <div class="body"><span class="prompt">$</span> npm install domotion-svg
<span class="dim">Resolving dependencies…</span>
    <div class="track"><div class="bar-fill"></div></div></div>
</body>
</html>
