<!doctype html>
<html><head><meta charset="utf-8"><style>
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 720px; height: 260px; }
  body { background: #0d1117; font-family: 'SF Mono', Menlo, monospace; color: #8b949e; padding: 28px 40px; }
  h2 { color: #e6edf3; font-size: 18px; font-weight: 600; margin-bottom: 22px; letter-spacing: .01em; }
  .row { display: flex; align-items: baseline; gap: 16px; height: 44px; }
  .tag { width: 130px; color: #58a6ff; font-size: 15px; }
</style></head>
<body>
  <h2>caret-shape</h2>
  <div class="row"><span class="tag">bar</span></div>
  <div class="row"><span class="tag">block</span></div>
  <div class="row"><span class="tag">underscore</span></div>
</body></html>
