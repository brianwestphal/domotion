<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; }
  .bg {
    width: 100%; height: 100%; box-sizing: border-box; padding: 28px;
    background: #0d1117; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; gap: 16px;
  }
  .tag {
    align-self: flex-start; font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: #56d364; border: 1px solid #56d364;
    border-radius: 999px; padding: 4px 12px;
  }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }
  .chrome { display: flex; align-items: center; gap: 8px; padding: 11px 16px; border-bottom: 1px solid #30363d; }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .name { margin-left: 8px; font-family: 'SF Mono', ui-monospace, monospace; font-size: 12px; color: #8b949e; }
  pre { margin: 0; padding: 18px 20px; font-family: 'SF Mono', ui-monospace, Menlo, monospace; font-size: 13.5px; line-height: 1.7; }
  .k { color: #ff7b72; } .f { color: #d2a8ff; } .s { color: #a5d6ff; } .c { color: #8b949e; } .v { color: #79c0ff; }
</style>
</head>
<body>
  <div class="bg">
    <div class="tag">After</div>
    <div class="card">
      <div class="chrome">
        <span class="dot" style="background:#ff5f56;"></span>
        <span class="dot" style="background:#ffbd2e;"></span>
        <span class="dot" style="background:#27c93f;"></span>
        <span class="name">totals.js</span>
      </div>
<pre><code><span class="k">const</span> <span class="f">total</span> = (items) =&gt;
  items
    .<span class="f">filter</span>((i) =&gt; i.active)
    .<span class="f">reduce</span>((sum, i) =&gt; sum + i.price, <span class="v">0</span>);

<span class="c">// 8 lines → 4, and no mutable state.</span></code></pre>
    </div>
  </div>
</body>
</html>
