<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; height: 100%; }
  .bg {
    width: 100%; height: 100%; box-sizing: border-box;
    background: #0d1117; color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column; align-items: center; padding-top: 64px;
  }
  .brand { font-size: 14px; letter-spacing: 0.18em; text-transform: uppercase; color: #8b949e; margin-bottom: 18px; }
  .search {
    width: 560px; box-sizing: border-box; display: flex; align-items: center; gap: 12px;
    background: #161b22; border: 1px solid #30363d; border-radius: 14px;
    padding: 16px 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.35);
  }
  .search.focus { border-color: #79b8ff; box-shadow: 0 0 0 3px rgba(121,184,255,0.18), 0 8px 30px rgba(0,0,0,0.35); }
  .icon { width: 20px; height: 20px; flex: 0 0 auto; color: #8b949e; }
  /* The typed text is painted by the typing overlay, anchored over this slot. */
  .field { flex: 1; height: 22px; }
  .kbd { font-size: 12px; color: #6e7681; border: 1px solid #30363d; border-radius: 6px; padding: 2px 7px; font-family: 'SF Mono', ui-monospace, monospace; }
  .hint { margin-top: 16px; font-size: 13px; color: #6e7681; }
</style>
</head>
<body>
  <div class="bg">
    <div class="brand">Domotion Docs</div>
    <div class="search focus">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <div class="field"></div>
      <span class="kbd">⌘K</span>
    </div>
    <div class="hint">Search the guides, API reference, and CSS support tables…</div>
  </div>
</body>
</html>
