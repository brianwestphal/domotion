  <style>
@font-face { font-family: "dmf0"; font-style: normal; font-weight: 400; src: url("data:font/ttf;base64,"); }
@font-face { font-family: "dmf1"; font-style: normal; font-weight: 700; src: url("data:font/ttf;base64,"); }
    :root { --scene-dur: 3.80s; }
    .f { opacity: 0; visibility: hidden; }
    
    @keyframes fv-0 {
      0%,  50.00%, 100% { opacity: 0; }
      0.00%, 36.84% { opacity: 1; }
    }
    @keyframes fd-0 {
      0% { visibility: hidden; }
      0.000% { visibility: hidden; }
      0.000% { visibility: visible; }
      50.000% { visibility: visible; }
      50.010% { visibility: hidden; }
      100% { visibility: hidden; }
    }
    .f-0 { animation: fv-0 3.80s infinite, fd-0 3.80s infinite step-end; }

    @keyframes fv-1 {
      0%, 36.83%, 100.00%, 100% { opacity: 0; }
      50.00%, 86.84% { opacity: 1; }
    }
    @keyframes fd-1 {
      0% { visibility: hidden; }
      36.830% { visibility: hidden; }
      36.840% { visibility: visible; }
      100.000% { visibility: visible; }
      100.000% { visibility: hidden; }
      100% { visibility: hidden; }
    }
    .f-1 { animation: fv-1 3.80s infinite, fd-1 3.80s infinite step-end; }
  </style>
