name: Windows fidelity

# Captures genuine Chromium-on-Windows signal (real DirectWrite font fallback +
# real Windows system fonts) that we have no faithful way to obtain on a Mac or
# in a Linux container — Wine's dwrite reimplementation does not match real
# Windows fallback, and the Windows system fonts aren't redistributable.
#
# Runs on PRs that touch render-affecting paths (the renderer, capture, the
# glyph extractors, the visual fixtures/runner, or the deps that drive
# rendering) — so visual regressions are caught on the PRs that can cause them,
# with ~0 cost on docs/CI-only PRs (DM-262, path-filtered triggers). Also
# available via manual dispatch. The win32 fallback chain is calibrated and the
# feature suite passes within the documented Windows text-hinting floor
# (DM-836 / DM-262), so the `regression` job is green on a clean branch and goes
# red on genuine breakage. (Making these checks *blocking* is a branch-protection
# setting in the repo's GitHub settings, separate from this trigger.)
#
# Produces two downloadable artifacts:
#   - font-widths-windows  : Chromium-on-Windows painted advance widths (JSON),
#                            the input for building the win32 fallback chain.
#   - windows-fidelity-diffs : expected/actual/diff PNGs from the feature suite,
#                            so you can eyeball where Windows output diverges.
#
# Also runs glyph-extractor-build: compiles the DirectWrite glyph extractor
# (tools/win32-glyph-extractor) and runs its fontkit-parity test on the real
# Windows font stack — the release-independent way to validate the win32 helper.

on:
  workflow_dispatch:
  # DM-1405: NO `paths:` filter — see test-linux.yml. The `regression` job is
  # meant to be a REQUIRED check; a path-skipped required check blocks PRs
  # forever, so this runs on every PR and gates relative to the committed
  # baseline (below).
  pull_request:

env:
  # Match the Release workflow's pin (Node 22.22.x ships a broken bundled npm).
  NODE_VERSION: '22.21.0'

jobs:
  font-width-probe:
    # DM-1405: paths filter dropped so the required `regression` gate always
    # reports on PRs; keep the diagnostics/build jobs on-demand (not every PR).
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Probe Chromium-on-Windows painted advances
        run: node scripts/probe-platform-font-widths.mjs --out font-widths-windows.json
      - name: Show a summary in the run log
        run: node -e "const d=require('./font-widths-windows.json');console.log('platform',d.platform,'chromium',d.chromiumVersion,'measurements',d.widths.length)"
      - uses: actions/upload-artifact@v4
        with:
          name: font-widths-windows
          path: font-widths-windows.json
          if-no-files-found: error

  regression:
    # DM-1405: distinct check-run name (see test-linux.yml) so this Windows gate
    # is a separately-required status check from the Linux one.
    name: Windows fidelity regression
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Run feature visual-regression suite
        # Passes within the Windows text-hinting floor (DM-262 / DM-884): the
        # runner applies a per-platform coverage cap on win32 because DirectWrite
        # grid-fits native text while Domotion fills unhinted vector outlines.
        # DM-1405: absolute pass/fail is ADVISORY (|| true); the gate is the
        # baseline diff below (regressions vs tests/baselines/features-windows.json),
        # so pre-existing residuals (background-clip-text-nested-child-wraps,
        # DM-1420) don't block but a NEW regression does. (pwsh: force success so
        # the advisory suite never fails the step — the gate step is next.)
        run: |
          npm run demos:test
          exit 0
      - name: Gate vs committed Windows baseline (regressions only, DM-1405)
        run: >
          node scripts/diff-against-baseline.mjs
          --results tests/output/features-results.json
          --baseline tests/baselines/features-windows.json
          --strict --label "windows / features"
      - name: Upload expected/actual/diff PNGs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-fidelity-diffs
          # DM-1405: also upload features-results.json to refresh the Windows
          # baseline from a real run (scripts/seed-feature-baseline.mjs --os windows).
          path: |
            tests/output/*.png
            tests/output/features-results.json
          if-no-files-found: error

  # Compile the DirectWrite glyph extractor and run its parity test against the
  # real Windows font stack. This is the release-independent validation path for
  # the win32 helper (the release-helpers.yml job builds + uploads the asset; this
  # one just proves it compiles and matches fontkit) — run it after editing the
  # C++ to catch build / y-flip / .ttc-resolution issues without cutting a tag.
  glyph-extractor-build:
    if: github.event_name != 'pull_request'   # DM-1405: on-demand, not every PR (also currently red — DM-1421)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Build the DirectWrite helper
        shell: pwsh
        run: ./tools/win32-glyph-extractor/build.ps1
      - name: Smoke-test the helper (Arial H)
        shell: pwsh
        run: |
          '{"fonts":[{"ref":"f","fontPath":"C:\\Windows\\Fonts\\arial.ttf","size":2048}],"queries":[{"type":"meta","fontRef":"f"},{"type":"glyphs","fontRef":"f","glyphs":[{"cp":72}]}]}' `
            | ./tools/win32-glyph-extractor/domotion-glyph-paths.exe
      - name: Run the fontkit-parity test
        run: npx vitest run tests/win32-glyph-extractor.test.ts

  # DM-987: re-run the per-Unicode-block DirectWrite font-routing sweep and upload
  # the JSON as an artifact, so a contributor without a Windows box can refresh
  # the routing table. Clones the public html-test repo for the per-block unicode
  # fixtures, runs the same `CSS.getPlatformFontsForNode` sweep, and uploads
  # `unicode-fonts.win32.json`. Manual-dispatch only (the committed table rarely
  # needs refreshing — only when Chromium's fallback or the Windows font set
  # changes).
  #
  # CAVEAT: `windows-latest` is Windows Server, whose default font set is NARROWER
  # than desktop Windows 11 (it omits several supplemental faces — Yu Gothic,
  # SimSun-ExtB, some Indic/historic faces — that ship by default on desktop).
  # The committed `tests/output/unicode-fonts.win32.json` is the DESKTOP Windows 11
  # calibration (the representative consumer environment). Treat this job's
  # artifact as a coverage-gap CHECK, not a drop-in replacement: regenerate the
  # committed table on real desktop Windows 11 (run `tools/probe-983-sweep.mjs`
  # there, then `node tools/probe-983-genroutes-win32.mjs` locally).
  font-routing-sweep:
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Clone html-test (per-Unicode-block fixtures)
        run: git clone --depth 1 https://github.com/brianwestphal/html-test.git external/html-test
      - name: Run the DirectWrite font-routing sweep
        env:
          HTML_TEST_DIR: external/html-test/unicode
          UNICODE_FONTS_OUT: unicode-fonts.win32.json
        run: node tools/probe-983-sweep.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: unicode-fonts-win32
          path: unicode-fonts.win32.json
          if-no-files-found: error

  # DM-884 diagnostic: pinpoint the Windows primary-font (Arial) text-positioning
  # drift behind the feature regression. Dumps the captured per-char xOffsets +
  # baseline vs the positions Chromium-on-Windows actually painted. Read the log:
  # the delta pattern says whether xOffsets are absent (renderer sums fontkit
  # advances), unfaithful (capture), or matching (render-side / vertical).
  text-drift-probe:
    if: github.event_name != 'pull_request'   # DM-1405: diagnostic, on-demand only
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: npm }
      - run: npm ci
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Probe captured vs painted text positions
        run: npx tsx tools/probe-win-text-drift.ts
