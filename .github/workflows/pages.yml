name: Build & deploy site to GitHub Pages

# DM-1308: deploys the Astro + Starlight site in site-next/ to
# brianwestphal.github.io/domotion. The site builds entirely from assets already
# committed in the repo — scripts/build-demos.mjs copies the demo SVGs from
# examples/output, site/assets/img/demos, and site-next/demo-assets/apps, and
# scripts/sync-docs.mjs generates the schema reference from schemas/ — so no
# Playwright/capture step is needed here (unlike the legacy site/ build).
on:
  push:
    branches: [main]
    paths:
      - 'site-next/**'
      - 'examples/output/**'
      - 'schemas/**'
      - 'site/assets/img/demos/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site-next/package-lock.json

      - name: Install site deps
        working-directory: site-next
        run: npm ci

      - name: Build site
        working-directory: site-next
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site-next/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
