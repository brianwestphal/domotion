name: Build & deploy user manual to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'src/**'
      - 'examples/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Playwright Chromium is needed by the image-generation script.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate manual images
        run: npx tsx site/scripts/generate-images.ts

      - name: Build manual
        run: npx tsx site/build.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
